version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - APP_ENV=development
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
    volumes:
      - ./backend:/var/www/html
    networks:
      - gradtrack

  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - gradtrack

networks:
  gradtrack:
    driver: bridge
