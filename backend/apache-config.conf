# Apache Virtual Host Configuration for GradTrack Backend
# Place this file in: /etc/apache2/sites-available/gradtrack.conf

<VirtualHost *:80>
    # Update with your domain or use EC2 IP
    ServerName your-domain.com
    ServerAlias www.your-domain.com
    
    # Document root points to backend directory
    DocumentRoot /var/www/html/gradtrack/backend
    
    <Directory /var/www/html/gradtrack/backend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Enable CORS
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
    Header always set Access-Control-Allow-Credentials "true"
    
    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/gradtrack-error.log
    CustomLog ${APACHE_LOG_DIR}/gradtrack-access.log combined
</VirtualHost>

# After creating this file, run:
# sudo a2ensite gradtrack.conf
# sudo a2enmod rewrite headers
# sudo systemctl restart apache2
